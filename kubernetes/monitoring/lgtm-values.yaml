# ─────────────────────────────────────────
# GRAFANA – Dashboard + zusätzliche Datenquelle
# ─────────────────────────────────────────
grafana:
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        # Mimir (Metriken) – bereits intern vorhanden, explizit konfiguriert
        - name: Mimir
          type: prometheus
          url: http://{{ .Release.Name }}-mimir-nginx.monitoring.svc:80/prometheus
          isDefault: true
          access: proxy
          editable: false
        # Loki (Logs) – zusätzliche Datenquelle
        - name: Loki
          type: loki
          url: http://{{ .Release.Name }}-loki-gateway.monitoring.svc:80
          access: proxy
          editable: false
        # Tempo (Traces) – zusätzliche Datenquelle
        - name: Tempo
          type: tempo
          url: http://{{ .Release.Name }}-tempo.monitoring.svc:3100
          access: proxy
          editable: false

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      webshop-services:
        json: |
          {
            "annotations": {
              "list": [
                {
                  "builtIn": 1,
                  "datasource": {
                    "type": "grafana",
                    "uid": "-- Grafana --"
                  },
                  "enable": true,
                  "hide": true,
                  "iconColor": "rgba(0, 211, 255, 1)",
                  "name": "Annotations & Alerts",
                  "type": "dashboard"
                }
              ]
            },
            "editable": true,
            "fiscalYearStartMonth": 0,
            "graphTooltip": 0,
            "id": 1,
            "links": [],
            "panels": [
              {
                "datasource": "Mimir",
                "fieldConfig": {
                  "defaults": {
                    "color": {
                      "mode": "palette-classic"
                    },
                    "custom": {
                      "axisBorderShow": false,
                      "axisCenteredZero": false,
                      "axisColorMode": "text",
                      "axisLabel": "",
                      "axisPlacement": "auto",
                      "barAlignment": 0,
                      "barWidthFactor": 0.6,
                      "drawStyle": "line",
                      "fillOpacity": 0,
                      "gradientMode": "none",
                      "hideFrom": {
                        "legend": false,
                        "tooltip": false,
                        "viz": false
                      },
                      "insertNulls": false,
                      "lineInterpolation": "linear",
                      "lineWidth": 1,
                      "pointSize": 5,
                      "scaleDistribution": {
                        "type": "linear"
                      },
                      "showPoints": "auto",
                      "showValues": false,
                      "spanNulls": false,
                      "stacking": {
                        "group": "A",
                        "mode": "none"
                      },
                      "thresholdsStyle": {
                        "mode": "off"
                      }
                    },
                    "mappings": [],
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": 0
                        },
                        {
                          "color": "red",
                          "value": 80
                        }
                      ]
                    }
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 8,
                  "w": 24,
                  "x": 0,
                  "y": 0
                },
                "id": 1,
                "options": {
                  "legend": {
                    "calcs": [],
                    "displayMode": "list",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "tooltip": {
                    "hideZeros": false,
                    "mode": "single",
                    "sort": "none"
                  }
                },
                "pluginVersion": "12.2.1",
                "targets": [
                  {
                    "editorMode": "code",
                    "expr": "sum by (service) (\n  label_replace(\n    rate(container_cpu_usage_seconds_total{namespace=\"webshop\"}[5m]),\n    \"service\", \"$1\", \"pod\", \"^(.*)-deployment-.*$\"\n  )\n)",
                    "legendFormat": "{{service}}",
                    "range": true,
                    "refId": "A"
                  }
                ],
                "title": "CPU Usage (by service)",
                "type": "timeseries"
              }
            ],
            "preload": false,
            "refresh": "",
            "schemaVersion": 42,
            "tags": [],
            "templating": {
              "list": []
            },
            "timepicker": {},
            "timezone": "",
            "title": "Service CPU Usage",
            "uid": "service-cpu",
            "version": 1
          }

# ─────────────────────────────────────────
# TEMPO – Replica-Anzahl anpassen
# ─────────────────────────────────────────
tempo:
  distributor:
    replicas: 2
  ingester:
    replicas: 3
  querier:
    replicas: 2
  queryFrontend:
    replicas: 1
  compactor:
    replicas: 1
