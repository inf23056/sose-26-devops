apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service-deployment
spec:
  replicas: 2     
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
    spec:
      containers:
        - name: checkout-service-container
          image: inf23056/checkout-service:latest
          ports:
            - containerPort: 8080