name: Publish

on:
  push:
    tags:
      - '[A-Za-z0-9-]+: v[0-9]+\.[0-9]+\.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get service name and version
        id: service
        run: |
          REF_NAME="${GITHUB_REF##*/}"
          SERVICE="$(echo "${REF_NAME}" | rev | cut -d '-' -f 2- | rev)"
          VERSION="$(echo "${REF_NAME}" | rev | cut -d '-' -f 1 | rev)"

          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Print service and version
        run: |
          echo "Service: ${{ steps.service.outputs.service }}"
          echo "Version: ${{ steps.service.outputs.version }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg SERVICE=${{ steps.service.outputs.service }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:latest

