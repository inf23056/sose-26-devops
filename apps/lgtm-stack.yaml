apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lgtm-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: lgtm-distributed
    targetRevision: 3.0.1
    helm:
      valueFiles:
        - $values/kubernetes/monitoring/lgtm-values.yaml
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: lgtm-distributed
      targetRevision: 3.0.1
      helm:
        valueFiles:
          - $values/kubernetes/monitoring/lgtm-values.yaml
    - repoURL: https://github.com/inf23056/sose-26-devops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
